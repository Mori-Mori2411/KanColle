<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>艦これ 資材・遠征管理</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f7f7f5;--bg3:#f0efe9;
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
  --radius:8px;--radius-lg:12px;
  --green:#1D9E75;--red:#D85A30;--blue:#378ADD;--purple:#534AB7;--amber:#BA7517;--gray:#888780;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1e1e1c;--bg2:#252523;--bg3:#2c2c2a;
    --text:#e8e6df;--text2:#9e9c95;--text3:#636158;
    --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.18);
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh;font-size:14px}
a{color:inherit;text-decoration:none}
input,select,textarea,button{font-family:inherit;font-size:14px;color:var(--text)}
input,select,textarea{background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--radius);padding:7px 10px;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--blue)}
textarea{resize:vertical;line-height:1.5}
button{cursor:pointer;border:0.5px solid var(--border2);background:var(--bg2);border-radius:var(--radius);padding:7px 14px;color:var(--text);transition:background 0.15s}
button:hover{background:var(--bg3)}
button.primary{background:var(--text);color:var(--bg);border-color:var(--text)}
button.primary:hover{opacity:0.85}
button.danger{color:var(--red);border-color:transparent;background:none;padding:4px 6px}
button.danger:hover{background:var(--bg2)}

/* Layout */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
.login-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:2rem;width:100%;max-width:360px;text-align:center}
.login-card h1{font-size:18px;font-weight:500;margin-bottom:6px}
.login-card p{font-size:13px;color:var(--text2);margin-bottom:1.5rem;line-height:1.6}
.login-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:10px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg2);font-size:14px;cursor:pointer}
.login-btn:hover{background:var(--bg3)}
.login-btn img{width:18px;height:18px}

#app{display:none;max-width:800px;margin:0 auto;padding:0 12px 60px}
.topbar{display:flex;align-items:center;gap:10px;padding:14px 0 10px;margin-bottom:4px}
.topbar h1{font-size:16px;font-weight:500;flex:1}
.user-area{display:flex;align-items:center;gap:8px}
.user-avatar{width:28px;height:28px;border-radius:50%;object-fit:cover}
.user-name{font-size:12px;color:var(--text2)}
.logout-btn{font-size:12px;color:var(--text3);background:none;border:none;padding:4px 6px}

/* Main tabs */
.main-tabs{display:flex;gap:2px;border-bottom:0.5px solid var(--border);margin-bottom:1.25rem}
.main-tab{padding:9px 20px;font-size:14px;cursor:pointer;border:none;background:none;color:var(--text2);border-bottom:2px solid transparent;transition:all 0.15s}
.main-tab.active{color:var(--text);border-bottom-color:var(--text);font-weight:500}
.main-sec{display:none}.main-sec.active{display:block}

/* Cards */
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:0.875rem}
.card-title{font-size:13px;font-weight:500;margin-bottom:0.875rem;display:flex;align-items:center;gap:6px}

/* Resource metrics */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:1rem}
.mc{background:var(--bg2);border-radius:var(--radius);padding:0.75rem 0.875rem}
.mc-label{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:3px;margin-bottom:3px}
.mc-val{font-size:20px;font-weight:500;line-height:1.2}
.mc-delta{font-size:11px;margin-top:2px}
.pos{color:var(--green)}.neg{color:var(--red)}.zero{color:var(--text3)}
.cap-bar{height:3px;background:var(--border);border-radius:2px;margin-top:5px}
.cap-fill{height:3px;border-radius:2px}

/* Resource form */
.inp-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:8px;margin-bottom:0.875rem}
.inp-row{display:flex;align-items:center;gap:8px}
.inp-row label{font-size:12px;color:var(--text2);min-width:60px;display:flex;align-items:center;gap:3px}
.inp-row input{flex:1;min-width:0}
.memo-row{display:flex;align-items:center;gap:8px;margin-bottom:0.875rem}
.memo-row label{font-size:12px;color:var(--text2);min-width:60px}
.btn-row{display:flex;gap:8px;justify-content:flex-end}

/* Log table */
.log-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:600px}
th{text-align:left;padding:5px 7px;color:var(--text3);font-weight:400;border-bottom:0.5px solid var(--border)}
td{padding:6px 7px;border-bottom:0.5px solid var(--border);white-space:nowrap}
tr:last-child td{border-bottom:none}

/* Expedition tabs */
.exp-tabs{display:flex;gap:2px;border-bottom:0.5px solid var(--border);margin-bottom:1rem}
.exp-tab{padding:7px 14px;font-size:13px;cursor:pointer;border:none;background:none;color:var(--text2);border-bottom:2px solid transparent;transition:all 0.15s}
.exp-tab.active{color:var(--text);border-bottom-color:var(--text);font-weight:500}
.exp-sec{display:none}.exp-sec.active{display:block}

/* Expedition cards */
.exp-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:0.875rem 1rem;margin-bottom:0.75rem}
.exp-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.exp-name{font-size:14px;font-weight:500}
.exp-time{font-size:12px;color:var(--text2);margin-top:2px}
.exp-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.exp-field-label{font-size:11px;color:var(--text3);margin-bottom:2px;display:flex;align-items:center;gap:3px}
.exp-field-val{font-size:12px;color:var(--text);line-height:1.4}
.reward-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.chip{background:var(--bg2);border-radius:var(--radius);padding:3px 8px;font-size:11px;display:flex;align-items:center;gap:3px}

/* Theory box */
.theory-box{background:var(--bg2);border-radius:var(--radius-lg);padding:0.875rem 1rem;margin-bottom:1rem}
.theory-header{display:flex;align-items:center;gap:8px;margin-bottom:0.625rem;flex-wrap:wrap}
.theory-label{font-size:13px;color:var(--text2);flex:1}
.theory-hours{display:flex;align-items:center;gap:6px}
.theory-hours input{width:52px;text-align:center;padding:4px 6px;font-size:13px}
.theory-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(95px,1fr));gap:6px}
.tv-item{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:0.5rem 0.75rem}
.tv-label{font-size:10px;color:var(--text3);margin-bottom:2px;display:flex;align-items:center;gap:3px}
.tv-val{font-size:17px;font-weight:500}

/* Add expedition form */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.form-row{display:flex;flex-direction:column;gap:4px}
.form-row.full{grid-column:1/-1}
.form-row label{font-size:11px;color:var(--text2)}
.reward-inputs{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px}
.ri-wrap{display:flex;flex-direction:column;gap:3px}
.ri-wrap label{font-size:10px;color:var(--text2)}
.ri-wrap input{text-align:center;padding:4px 6px}

/* Sync status */
.sync-bar{display:flex;align-items:center;gap:6px;margin-bottom:12px;font-size:12px;color:var(--text2)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}
.sync-dot.err{background:var(--red)}
.sync-dot.loading{background:var(--amber)}

/* Badges */
.badge{font-size:11px;padding:2px 8px;border-radius:var(--radius);border:0.5px solid;display:inline-flex;align-items:center;gap:3px}
.badge-game{background:#E6F1FB;color:#185FA5;border-color:#378ADD}
.badge-out{background:#E1F5EE;color:#0F6E56;border-color:#1D9E75}
.badge-sleep{background:#EEEDFE;color:#534AB7;border-color:#7F77DD}

.empty{font-size:13px;color:var(--text3);text-align:center;padding:1.5rem 0}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:8px 20px;border-radius:var(--radius);font-size:13px;pointer-events:none;opacity:0;transition:opacity 0.2s;z-index:999;white-space:nowrap}
.config-note{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:1rem;font-size:13px;color:var(--text2);line-height:1.7}
.config-note code{background:var(--bg3);padding:1px 5px;border-radius:4px;font-family:monospace;font-size:12px;color:var(--text)}
@media(max-width:500px){
  .form-grid{grid-template-columns:1fr}
  .exp-detail-grid{grid-template-columns:1fr}
  .reward-inputs{grid-template-columns:repeat(2,1fr)}
  .main-tab{padding:9px 12px;font-size:13px}
}
</style>
</head>
<body>

<!-- ログイン画面 -->
<div id="login-screen">
  <div class="login-card">
    <div style="font-size:32px;margin-bottom:12px">⚓</div>
    <h1>艦これ 資材・遠征管理</h1>
    <p>個人用の資材記録・遠征管理ツールです。<br>Googleアカウントでサインインしてください。</p>
    <div id="firebase-config-notice" style="display:none;background:#FAEEDA;border:0.5px solid #BA7517;border-radius:8px;padding:10px 14px;margin-bottom:1rem;font-size:12px;color:#633806;text-align:left;line-height:1.6">
      <strong>⚠ Firebase設定が必要です</strong><br>
      このファイル内の <code>FIREBASE_CONFIG</code> を実際の値に置き換えてください。<br>
      詳しくはREADME.mdを参照してください。
    </div>
    <button class="login-btn" onclick="signInWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Googleでサインイン
    </button>
  </div>
</div>

<!-- メインアプリ -->
<div id="app">
  <div class="topbar">
    <h1>⚓ 艦これ 資材・遠征管理</h1>
    <div class="user-area">
      <img id="user-avatar" class="user-avatar" src="" alt="" style="display:none">
      <span id="user-name" class="user-name"></span>
      <button class="logout-btn" onclick="signOut()"><i class="ti ti-logout"></i> ログアウト</button>
    </div>
  </div>

  <div class="sync-bar">
    <span class="sync-dot" id="sync-dot"></span>
    <span id="sync-txt">接続中...</span>
  </div>

  <div class="main-tabs">
    <button class="main-tab active" onclick="switchMain('resources')"><i class="ti ti-database"></i> 資材記録</button>
    <button class="main-tab" onclick="switchMain('expedition')"><i class="ti ti-ship"></i> 遠征管理</button>
  </div>

  <!-- 資材セクション -->
  <div id="main-resources" class="main-sec active">
    <div class="metrics" id="metrics"></div>

    <div class="card">
      <div class="card-title"><i class="ti ti-plus"></i> 資材を記録する</div>
      <div class="inp-grid" id="inp-grid"></div>
      <div class="memo-row">
        <label><i class="ti ti-pencil" style="font-size:13px"></i> メモ</label>
        <input type="text" id="inp-memo" placeholder="任意メモ（遠征、出撃など）">
      </div>
      <div class="btn-row">
        <button onclick="downloadCSV()"><i class="ti ti-download"></i> CSVダウンロード</button>
        <button class="primary" onclick="saveRecord()"><i class="ti ti-check"></i> 記録する</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title"><i class="ti ti-history"></i> 記録履歴（最新30件）</div>
      <div class="log-wrap">
        <table>
          <thead><tr>
            <th>日時</th><th>燃料</th><th>弾薬</th><th>鋼材</th><th>ボーキ</th><th>バケツ</th><th>開発</th><th>改修</th><th>メモ</th>
          </tr></thead>
          <tbody id="log-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 遠征セクション -->
  <div id="main-expedition" class="main-sec">
    <div class="exp-tabs">
      <button class="exp-tab active" onclick="switchExp('game')"><i class="ti ti-device-gamepad-2"></i> ゲーム中</button>
      <button class="exp-tab" onclick="switchExp('out')"><i class="ti ti-walk"></i> 外出中</button>
      <button class="exp-tab" onclick="switchExp('sleep')"><i class="ti ti-moon"></i> 就寝前</button>
    </div>
    <div id="exp-game" class="exp-sec active"></div>
    <div id="exp-out" class="exp-sec"></div>
    <div id="exp-sleep" class="exp-sec"></div>

    <div class="card">
      <div class="card-title"><i class="ti ti-plus"></i> 遠征を追加</div>
      <div class="form-grid">
        <div class="form-row"><label>遠征名</label><input type="text" id="f-name" placeholder="例：長距離練習航海"></div>
        <div class="form-row"><label>時間帯</label>
          <select id="f-slot">
            <option value="game">ゲーム中</option>
            <option value="out">外出中</option>
            <option value="sleep">就寝前</option>
          </select>
        </div>
        <div class="form-row"><label>所要時間（分）</label><input type="number" id="f-dur" placeholder="例：90" min="1"></div>
        <div class="form-row"><label>編成条件</label><input type="text" id="f-fleet" placeholder="例：軽巡1・駆逐2以上"></div>
        <div class="form-row full"><label>大成功条件</label><input type="text" id="f-cond" placeholder="例：旗艦Lv.4以上、近代化改修済み"></div>
        <div class="form-row full"><label>備考</label><textarea id="f-note" placeholder="自由メモ" rows="2"></textarea></div>
      </div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:6px">通常報酬（1回あたり）</div>
      <div class="reward-inputs">
        <div class="ri-wrap"><label><i class="ti ti-flame" style="font-size:11px"></i> 燃料</label><input type="number" id="r-fuel" value="0" min="0"></div>
        <div class="ri-wrap"><label><i class="ti ti-bomb" style="font-size:11px"></i> 弾薬</label><input type="number" id="r-ammo" value="0" min="0"></div>
        <div class="ri-wrap"><label><i class="ti ti-hammer" style="font-size:11px"></i> 鋼材</label><input type="number" id="r-steel" value="0" min="0"></div>
        <div class="ri-wrap"><label><i class="ti ti-diamond" style="font-size:11px"></i> ボーキ</label><input type="number" id="r-bauxite" value="0" min="0"></div>
        <div class="ri-wrap"><label><i class="ti ti-droplet" style="font-size:11px"></i> バケツ</label><input type="number" id="r-bucket" value="0" min="0"></div>
        <div class="ri-wrap"><label><i class="ti ti-tool" style="font-size:11px"></i> 開発資材</label><input type="number" id="r-devmat" value="0" min="0"></div>
        <div class="ri-wrap"><label><i class="ti ti-settings" style="font-size:11px"></i> 改修資材</label><input type="number" id="r-modmat" value="0" min="0"></div>
        <div class="ri-wrap"><label>大成功倍率</label>
          <select id="r-bonus" style="padding:4px 6px;text-align:center">
            <option value="1.5">×1.5</option>
            <option value="2.0">×2.0</option>
          </select>
        </div>
      </div>
      <div class="btn-row">
        <button class="primary" onclick="addExp()"><i class="ti ti-check"></i> 追加</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut as fbSignOut }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, collection, addDoc, getDocs, setDoc, onSnapshot, query, orderBy, limit, deleteDoc }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

// ============================================================
// ★ここにFirebaseの設定を貼り付けてください★
// Firebase Console > プロジェクト設定 > アプリ > firebaseConfig
// ============================================================
// Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyC_RR7YYqhTH_KAMCTyTsfywGD8oZDxvUE",
  authDomain: "kancolle-ffc54.firebaseapp.com",
  projectId: "kancolle-ffc54",
  storageBucket: "kancolle-ffc54.firebasestorage.app",
  messagingSenderId: "856812672764",
  appId: "1:856812672764:web:48911b20e97cf55dd96979",
  measurementId: "G-YV1RZ98W1L"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
// ============================================================

const isConfigured = !firebaseConfig.apiKey.includes('YOUR_');

if (!isConfigured) {
  document.getElementById('firebase-config-notice').style.display = 'block';
}

let app, auth, db, currentUser;
try {
  app = initializeApp(firebaseConfig);
  auth = getAuth(app);
  db = getFirestore(app);
} catch(e) {
  console.error('Firebase init error:', e);
}

// ---- 定数 ----
const RES = [
  {key:'fuel',   label:'燃料',  icon:'ti-flame',   cap:350000, color:'#1D9E75'},
  {key:'ammo',   label:'弾薬',  icon:'ti-bomb',    cap:350000, color:'#D85A30'},
  {key:'steel',  label:'鋼材',  icon:'ti-hammer',  cap:350000, color:'#888780'},
  {key:'bauxite',label:'ボーキ',icon:'ti-diamond', cap:350000, color:'#BA7517'},
  {key:'bucket', label:'バケツ',icon:'ti-droplet', cap:3000,   color:'#378ADD'},
  {key:'devmat', label:'開発資材',icon:'ti-tool',  cap:3000,   color:'#534AB7'},
  {key:'modmat', label:'改修資材',icon:'ti-settings',cap:300,  color:'#993556'}
];
const RES_KEYS = RES.map(r=>r.key);
const RES_MAP = Object.fromEntries(RES.map(r=>[r.key,r]));
const EXP_SLOTS = {
  game:{label:'ゲーム中',badge:'badge-game',defaultHours:2},
  out: {label:'外出中', badge:'badge-out', defaultHours:4},
  sleep:{label:'就寝前',badge:'badge-sleep',defaultHours:8}
};

// ---- 状態 ----
let records = [];
let expeditions = { game:[], out:[], sleep:[] };
let currentExpTab = 'game';
let unsubRecords = null;
let unsubExp = null;

// ---- Auth ----
window.signInWithGoogle = async () => {
  if (!isConfigured) { toast('Firebase設定が必要です'); return; }
  try {
    const provider = new GoogleAuthProvider();
    await signInWithPopup(auth, provider);
  } catch(e) { toast('ログインに失敗しました: ' + e.message); }
};

window.signOut = async () => {
  if (unsubRecords) unsubRecords();
  if (unsubExp) unsubExp();
  await fbSignOut(auth);
};

onAuthStateChanged(auth, user => {
  if (user) {
    currentUser = user;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    const av = document.getElementById('user-avatar');
    if (user.photoURL) { av.src = user.photoURL; av.style.display = 'block'; }
    document.getElementById('user-name').textContent = user.displayName || user.email;
    setSyncStatus('loading', '接続中...');
    listenRecords();
    listenExpeditions();
    renderInputs();
  } else {
    currentUser = null;
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }
});

// ---- Firestore リスナー ----
function userDoc(path) {
  return path ? `users/${currentUser.uid}/${path}` : `users/${currentUser.uid}`;
}

function listenRecords() {
  const q = query(collection(db, `users/${currentUser.uid}/records`), orderBy('ts','desc'), limit(30));
  unsubRecords = onSnapshot(q, snap => {
    records = snap.docs.map(d => ({id:d.id, ...d.data()})).sort((a,b)=>a.ts-b.ts);
    renderMetrics();
    renderLog();
    renderInputs();
    setSyncStatus('ok', '同期済み');
  }, err => setSyncStatus('err', '同期エラー: ' + err.message));
}

function listenExpeditions() {
  unsubExp = onSnapshot(doc(db, userDoc('data/expeditions')), snap => {
    if (snap.exists()) {
      const d = snap.data();
      expeditions = { game: d.game||[], out: d.out||[], sleep: d.sleep||[] };
    }
    renderAllExp();
  });
}

// ---- 資材 ----
function setSyncStatus(state, msg) {
  const dot = document.getElementById('sync-dot');
  dot.className = 'sync-dot' + (state==='err'?' err':state==='loading'?' loading':'');
  document.getElementById('sync-txt').textContent = msg;
}

function renderMetrics() {
  const last = records.length ? records[records.length-1] : null;
  const prev = records.length > 1 ? records[records.length-2] : null;
  document.getElementById('metrics').innerHTML = RES.map(r => {
    const v = last ? (last[r.key]||0) : 0;
    const d = prev ? v-(prev[r.key]||0) : null;
    const pct = Math.min(100, Math.round(v/r.cap*100));
    let dhtml = '';
    if (d !== null) {
      const cls = d>0?'pos':d<0?'neg':'zero';
      dhtml = `<div class="mc-delta ${cls}">${d>0?'+':''}${d.toLocaleString()}</div>`;
    }
    return `<div class="mc">
      <div class="mc-label"><i class="ti ${r.icon}" style="font-size:13px"></i>${r.label}</div>
      <div class="mc-val">${v.toLocaleString()}</div>${dhtml}
      <div class="cap-bar"><div class="cap-fill" style="width:${pct}%;background:${r.color}"></div></div>
    </div>`;
  }).join('');
}

function renderInputs() {
  const last = records.length ? records[records.length-1] : null;
  document.getElementById('inp-grid').innerHTML = RES.map(r => `
    <div class="inp-row">
      <label><i class="ti ${r.icon}" style="font-size:13px"></i>${r.label}</label>
      <input type="number" id="inp-${r.key}" value="${last?last[r.key]:0}" min="0" max="${r.cap}">
    </div>`).join('');
}

function renderLog() {
  const body = document.getElementById('log-body');
  const rows = [...records].reverse();
  if (!rows.length) {
    body.innerHTML = '<tr><td colspan="9" style="text-align:center;color:var(--text3);padding:1rem">記録がありません</td></tr>';
    return;
  }
  body.innerHTML = rows.map((entry, i) => {
    const prev = rows[i+1];
    const dt = new Date(entry.ts);
    const dateStr = `${dt.getMonth()+1}/${dt.getDate()} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
    return '<tr><td>' + dateStr + '</td>' +
      RES_KEYS.map(k => {
        const v = entry[k]||0;
        const d = prev ? v-(prev[k]||0) : null;
        let sub = '';
        if (d !== null) {
          const cls = d>0?'pos':d<0?'neg':'zero';
          sub = `<br><span class="${cls}" style="font-size:10px">${d>0?'+':''}${d.toLocaleString()}</span>`;
        }
        return `<td>${v.toLocaleString()}${sub}</td>`;
      }).join('') +
      `<td style="color:var(--text2)">${entry.memo||''}</td></tr>`;
  }).join('');
}

window.saveRecord = async () => {
  if (!currentUser) return;
  const entry = { ts: Date.now(), memo: document.getElementById('inp-memo').value.trim() };
  RES_KEYS.forEach(k => entry[k] = parseInt(document.getElementById('inp-'+k).value)||0);
  try {
    setSyncStatus('loading', '保存中...');
    await addDoc(collection(db, `users/${currentUser.uid}/records`), entry);
    document.getElementById('inp-memo').value = '';
    toast('記録しました ✓');
  } catch(e) { toast('保存エラー: ' + e.message); setSyncStatus('err','保存エラー'); }
};

window.downloadCSV = () => {
  if (!records.length) { toast('記録がありません'); return; }
  const header = '日時,燃料,弾薬,鋼材,ボーキ,バケツ,開発資材,改修資材,メモ';
  const rows = records.map(r => {
    const dt = new Date(r.ts);
    const dateStr = `${dt.getFullYear()}/${dt.getMonth()+1}/${dt.getDate()} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
    const memo = (r.memo||'').includes(',') ? `"${r.memo}"` : (r.memo||'');
    return [dateStr, r.fuel||0,r.ammo||0,r.steel||0,r.bauxite||0,r.bucket||0,r.devmat||0,r.modmat||0,memo].join(',');
  });
  const csv = header + '\n' + rows.join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,\uFEFF' + encodeURIComponent(csv);
  a.download = 'kancolle_resources.csv';
  a.click();
  toast('CSVをダウンロードしました');
};

// ---- 遠征 ----
window.switchExp = (slot) => {
  currentExpTab = slot;
  document.querySelectorAll('.exp-tab').forEach((t,i) => {
    t.classList.toggle('active', ['game','out','sleep'][i] === slot);
  });
  document.querySelectorAll('.exp-sec').forEach(s => s.classList.remove('active'));
  document.getElementById('exp-'+slot).classList.add('active');
  document.getElementById('f-slot').value = slot;
};

function renderAllExp() {
  ['game','out','sleep'].forEach(renderExpSlot);
}

function renderExpSlot(slot) {
  const el = document.getElementById('exp-' + slot);
  const exps = expeditions[slot] || [];
  const s = EXP_SLOTS[slot];
  const hours = s.defaultHours;

  let theoryHtml = '';
  if (exps.length) {
    const totals = {};
    RES_KEYS.forEach(k => totals[k] = 0);
    exps.forEach(e => {
      const runs = e.dur > 0 ? Math.floor(hours*60/e.dur) : 0;
      const bonus = parseFloat(e.bonus)||1.5;
      RES_KEYS.forEach(k => totals[k] += Math.round((e.reward[k]||0)*bonus)*runs);
    });
    const hasAny = RES_KEYS.some(k => totals[k] > 0);
    if (hasAny) {
      theoryHtml = `<div class="theory-box">
        <div class="theory-header">
          <span class="theory-label"><i class="ti ti-calculator" style="font-size:13px"></i> <span id="tlabel-${slot}">${hours}時間</span> 大成功理論値合計</span>
          <div class="theory-hours">
            <input type="number" id="th-${slot}" value="${hours}" min="1" max="24" oninput="updateTheory('${slot}',this.value)">
            <span style="font-size:12px;color:var(--text3)">時間</span>
          </div>
        </div>
        <div class="theory-grid" id="tg-${slot}">${RES_KEYS.filter(k=>totals[k]>0).map(k=>`
          <div class="tv-item">
            <div class="tv-label"><i class="ti ${RES_MAP[k].icon}" style="font-size:11px"></i>${RES_MAP[k].label}</div>
            <div class="tv-val" id="tv-${slot}-${k}">${totals[k].toLocaleString()}</div>
          </div>`).join('')}
        </div>
      </div>`;
    }
  }

  const cards = exps.length ? exps.map((e,i) => {
    const durLabel = e.dur ? (e.dur>=60?Math.floor(e.dur/60)+'時間':'') + (e.dur%60?e.dur%60+'分':'') : '時間未設定';
    const chips = RES_KEYS.filter(k=>(e.reward[k]||0)>0).map(k =>
      `<span class="chip"><i class="ti ${RES_MAP[k].icon}" style="font-size:11px"></i>${RES_MAP[k].label} ${e.reward[k]}</span>`
    ).join('');
    return `<div class="exp-card">
      <div class="exp-header">
        <div>
          <div class="exp-name">${e.name}</div>
          <div class="exp-time"><i class="ti ti-clock" style="font-size:12px"></i> ${durLabel}　大成功×${e.bonus}</div>
        </div>
        <button class="danger" onclick="delExp('${slot}',${i})" aria-label="削除"><i class="ti ti-trash"></i></button>
      </div>
      <div class="exp-detail-grid">
        ${e.fleet?`<div><div class="exp-field-label"><i class="ti ti-ship" style="font-size:11px"></i>編成条件</div><div class="exp-field-val">${e.fleet}</div></div>`:''}
        ${e.cond?`<div><div class="exp-field-label"><i class="ti ti-star" style="font-size:11px"></i>大成功条件</div><div class="exp-field-val">${e.cond}</div></div>`:''}
        ${e.note?`<div style="grid-column:1/-1"><div class="exp-field-label"><i class="ti ti-pencil" style="font-size:11px"></i>備考</div><div class="exp-field-val">${e.note}</div></div>`:''}
      </div>
      ${chips?`<div style="margin-top:6px;font-size:11px;color:var(--text3);margin-bottom:3px">通常報酬</div><div class="reward-chips">${chips}</div>`:''}
    </div>`;
  }).join('') : `<div class="empty"><i class="ti ti-ship" style="font-size:20px;display:block;margin-bottom:6px"></i>遠征が未登録です</div>`;

  el.innerHTML = theoryHtml + cards;
}

window.updateTheory = (slot, hoursVal) => {
  const hours = Math.max(1, parseInt(hoursVal)||1);
  const lbl = document.getElementById('tlabel-'+slot);
  if (lbl) lbl.textContent = hours+'時間';
  const exps = expeditions[slot]||[];
  const totals = {};
  RES_KEYS.forEach(k => totals[k]=0);
  exps.forEach(e => {
    const runs = e.dur>0 ? Math.floor(hours*60/e.dur) : 0;
    const bonus = parseFloat(e.bonus)||1.5;
    RES_KEYS.forEach(k => totals[k] += Math.round((e.reward[k]||0)*bonus)*runs);
  });
  RES_KEYS.forEach(k => {
    const el = document.getElementById('tv-'+slot+'-'+k);
    if (el) el.textContent = totals[k].toLocaleString();
  });
};

window.addExp = async () => {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { document.getElementById('f-name').focus(); return; }
  const slot = document.getElementById('f-slot').value;
  const reward = {};
  RES_KEYS.forEach(k => reward[k] = parseInt(document.getElementById('r-'+k).value)||0);
  expeditions[slot].push({
    name,
    dur: parseInt(document.getElementById('f-dur').value)||0,
    fleet: document.getElementById('f-fleet').value.trim(),
    cond: document.getElementById('f-cond').value.trim(),
    note: document.getElementById('f-note').value.trim(),
    reward,
    bonus: document.getElementById('r-bonus').value
  });
  ['f-name','f-dur','f-fleet','f-cond','f-note'].forEach(id => document.getElementById(id).value='');
  RES_KEYS.forEach(k => document.getElementById('r-'+k).value=0);
  await saveExpeditions();
  renderAllExp();
  switchExp(slot);
  toast('遠征を追加しました ✓');
};

window.delExp = async (slot, i) => {
  expeditions[slot].splice(i,1);
  await saveExpeditions();
  renderExpSlot(slot);
};

async function saveExpeditions() {
  try {
    await setDoc(doc(db, `users/${currentUser.uid}/data/expeditions`), expeditions);
  } catch(e) { toast('保存エラー: ' + e.message); }
}

// ---- タブ切り替え ----
window.switchMain = (name) => {
  document.querySelectorAll('.main-tab').forEach((t,i) => {
    t.classList.toggle('active', ['resources','expedition'][i] === name);
  });
  document.querySelectorAll('.main-sec').forEach(s => s.classList.remove('active'));
  document.getElementById('main-'+name).classList.add('active');
};

// ---- トースト ----
window.toast = (msg) => {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.opacity = 1;
  setTimeout(() => t.style.opacity = 0, 2200);
};
</script>
</body>
</html>

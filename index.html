<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>艦これ 資材・遠征管理</title>

<!-- Tablerアイコン（アイコンフォント） -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

<!-- スタイルシート（css/style.cssを読み込む） -->
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ========================================
     ログイン画面
     onAuthStateChanged でログイン済みなら非表示になる
     ======================================== -->
<div id="login-screen">
  <div class="login-card">
    <div style="font-size:32px;margin-bottom:12px">⚓</div>
    <h1>艦これ 資材・遠征管理</h1>
    <p>個人用の資材記録・遠征管理ツールです。<br>Googleアカウントでサインインしてください。</p>
    <!-- onclick で js/firebase.js の signIn() を呼ぶ -->
    <button class="login-btn" onclick="window.appSignIn()">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Googleでサインイン
    </button>
  </div>
</div>

<!-- ========================================
     メインアプリ（ログイン後に表示）
     ======================================== -->
<div id="app">

  <!-- トップバー -->
  <div class="topbar">
    <h1>⚓ 艦これ 資材・遠征管理</h1>
    <div class="user-area">
      <img id="user-avatar" class="user-avatar" src="" alt="" style="display:none">
      <span id="user-name" class="user-name"></span>
      <button class="logout-btn" onclick="window.appSignOut()">
        <i class="ti ti-logout"></i> ログアウト
      </button>
    </div>
  </div>

  <!-- 同期ステータス -->
  <div class="sync-bar">
    <span class="sync-dot" id="sync-dot"></span>
    <span id="sync-txt">接続中...</span>
  </div>

  <!-- メインタブ（資材記録 / 遠征管理） -->
  <div class="main-tabs">
    <button class="main-tab active" onclick="window.switchMain('resources')">
      <i class="ti ti-database"></i> 資材記録
    </button>
    <button class="main-tab" onclick="window.switchMain('expedition')">
      <i class="ti ti-ship"></i> 遠征管理
    </button>
  </div>

  <!-- ======== 資材記録セクション ======== -->
  <div id="main-resources" class="main-sec active">

    <!-- 資材カード（resources.jsのrenderMetrics()が書き換える） -->
    <div class="metrics" id="metrics"></div>

    <!-- 資材入力フォーム -->
    <div class="card">
      <div class="card-title"><i class="ti ti-plus"></i> 資材を記録する</div>
      <!-- 入力欄（resources.jsのrenderInputs()が書き換える） -->
      <div class="inp-grid" id="inp-grid"></div>
      <div class="memo-row">
        <label><i class="ti ti-pencil" style="font-size:13px"></i> メモ</label>
        <input type="text" id="inp-memo" placeholder="任意メモ（遠征、出撃など）">
      </div>
      <div class="btn-row">
        <button onclick="window.appDownloadCSV()">
          <i class="ti ti-download"></i> CSVダウンロード
        </button>
        <button class="primary" onclick="window.appSaveRecord()">
          <i class="ti ti-check"></i> 記録する
        </button>
      </div>
    </div>

    <!-- 履歴テーブル -->
    <div class="card">
      <div class="card-title"><i class="ti ti-history"></i> 記録履歴（最新30件）</div>
      <div class="log-wrap">
        <table>
          <thead>
            <tr>
              <th>日時</th>
              <th>燃料</th><th>弾薬</th><th>鋼材</th><th>ボーキ</th>
              <th>バケツ</th><th>開発</th><th>改修</th>
              <th>メモ</th>
            </tr>
          </thead>
          <!-- resources.jsのrenderLog()が書き換える -->
          <tbody id="log-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ======== 遠征管理セクション ======== -->
  <div id="main-expedition" class="main-sec">

    <!-- 遠征タブ（ゲーム中 / 外出中 / 就寝前） -->
    <div class="exp-tabs">
      <button class="exp-tab active" onclick="window.switchExpTab('game')">
        <i class="ti ti-device-gamepad-2"></i> ゲーム中
      </button>
      <button class="exp-tab" onclick="window.switchExpTab('out')">
        <i class="ti ti-walk"></i> 外出中
      </button>
      <button class="exp-tab" onclick="window.switchExpTab('sleep')">
        <i class="ti ti-moon"></i> 就寝前
      </button>
    </div>

    <!-- 各スロットの遠征一覧（expedition.jsのrenderSlot()が書き換える） -->
    <div id="exp-game"  class="exp-sec active"></div>
    <div id="exp-out"   class="exp-sec"></div>
    <div id="exp-sleep" class="exp-sec"></div>

    <!-- 遠征追加フォーム -->
    <div class="card">
      <div class="card-title"><i class="ti ti-plus"></i> 遠征を追加</div>
      <div class="form-grid">
        <div class="form-row">
          <label>遠征名</label>
          <input type="text" id="f-name" placeholder="例：長距離練習航海">
        </div>
        <div class="form-row">
          <label>時間帯</label>
          <select id="f-slot">
            <option value="game">ゲーム中</option>
            <option value="out">外出中</option>
            <option value="sleep">就寝前</option>
          </select>
        </div>
        <div class="form-row">
          <label>所要時間（分）</label>
          <input type="number" id="f-dur" placeholder="例：90" min="1">
        </div>
        <div class="form-row">
          <label>編成条件</label>
          <input type="text" id="f-fleet" placeholder="例：軽巡1・駆逐2以上">
        </div>
        <div class="form-row full">
          <label>大成功条件</label>
          <input type="text" id="f-cond" placeholder="例：旗艦Lv.4以上、近代化改修済み">
        </div>
        <div class="form-row full">
          <label>備考</label>
          <textarea id="f-note" placeholder="自由メモ" rows="2"></textarea>
        </div>
      </div>

      <!-- 報酬入力 -->
      <div style="font-size:12px;color:var(--text2);margin-bottom:6px">通常報酬（1回あたり）</div>
      <div class="reward-inputs">
        <div class="ri-wrap"><label><i class="ti ti-flame"    style="font-size:11px"></i> 燃料</label>  <input type="number" id="r-fuel"    value="0" min="0"></div>
        <div class="ri-wrap"><label><i class="ti ti-bomb"     style="font-size:11px"></i> 弾薬</label>  <input type="number" id="r-ammo"    value="0" min="0"></div>
        <div class="ri-wrap"><label><i class="ti ti-hammer"   style="font-size:11px"></i> 鋼材</label>  <input type="number" id="r-steel"   value="0" min="0"></div>
        <div class="ri-wrap"><label><i class="ti ti-diamond"  style="font-size:11px"></i> ボーキ</label><input type="number" id="r-bauxite" value="0" min="0"></div>
        <div class="ri-wrap"><label><i class="ti ti-droplet"  style="font-size:11px"></i> バケツ</label><input type="number" id="r-bucket"  value="0" min="0"></div>
        <div class="ri-wrap"><label><i class="ti ti-tool"     style="font-size:11px"></i> 開発資材</label><input type="number" id="r-devmat" value="0" min="0"></div>
        <div class="ri-wrap"><label><i class="ti ti-settings" style="font-size:11px"></i> 改修資材</label><input type="number" id="r-modmat" value="0" min="0"></div>
        <div class="ri-wrap">
          <label>大成功倍率</label>
          <select id="r-bonus" style="padding:4px 6px;text-align:center">
            <option value="1.5">×1.5</option>
            <option value="2.0">×2.0</option>
          </select>
        </div>
      </div>

      <div class="btn-row">
        <button class="primary" onclick="window.appAddExpedition()">
          <i class="ti ti-check"></i> 追加
        </button>
      </div>
    </div>
  </div>

</div><!-- /#app -->

<!-- トースト通知 -->
<div class="toast" id="toast"></div>

<!-- ========================================
     メインスクリプト
     type="module" をつけることでimportが使える
     ======================================== -->
<script type="module">
// --- 各JSファイルから必要な関数・定数を読み込む ---
import { auth, signIn, signOut, onAuthStateChanged } from './js/firebase.js';
import {
  listenRecords, stopListening,
  saveRecord, downloadCSV,
  renderMetrics, renderInputs, renderLog
} from './js/resources.js';
import {
  listenExpeditions, stopListeningExp,
  switchExpTab, addExpedition, deleteExpedition,
  renderAllSlots, updateTheory
} from './js/expedition.js';

// ---------- トースト通知 ----------
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity = 1;
  setTimeout(() => t.style.opacity = 0, 2200);
}

function setSyncStatus(state, msg) {
  const dot = document.getElementById('sync-dot');
  dot.className = 'sync-dot' + (state === 'err' ? ' err' : state === 'loading' ? ' loading' : '');
  document.getElementById('sync-txt').textContent = msg;
}

// ---------- メインタブ切り替え ----------
function switchMain(name) {
  document.querySelectorAll('.main-tab').forEach((t, i) => {
    t.classList.toggle('active', ['resources', 'expedition'][i] === name);
  });
  document.querySelectorAll('.main-sec').forEach(s => s.classList.remove('active'));
  document.getElementById('main-' + name).classList.add('active');
}

// ---------- ログイン状態の監視 ----------
// ページ読み込み時・ログイン・ログアウト時に自動で呼ばれる
onAuthStateChanged(auth, user => {
  if (user) {
    // ログイン済み：アプリ画面を表示
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display         = 'block';

    // アバター・ユーザー名を表示
    const av = document.getElementById('user-avatar');
    if (user.photoURL) { av.src = user.photoURL; av.style.display = 'block'; }
    document.getElementById('user-name').textContent = user.displayName || user.email;

    setSyncStatus('loading', '接続中...');

    // 資材・遠征データの監視を開始
    listenRecords(user.uid);
    listenExpeditions(user.uid);

    // 入力欄の初期描画
    renderInputs();

  } else {
    // 未ログイン：ログイン画面を表示
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app').style.display          = 'none';

    // 監視を停止（メモリリーク防止）
    stopListening();
    stopListeningExp();
  }
});

// ---------- window に公開（HTMLのonclickから呼ぶため） ----------
// type="module" 内の関数はそのままではHTMLから見えないので window に登録する

window.appSignIn  = signIn;
window.appSignOut = signOut;
window.switchMain = switchMain;

window.appSaveRecord = async () => {
  const user = auth.currentUser;
  if (!user) return;
  setSyncStatus('loading', '保存中...');
  try {
    await saveRecord(user.uid);
    setSyncStatus('ok', '同期済み');
    showToast('記録しました ✓');
  } catch (e) {
    setSyncStatus('err', '保存エラー');
    showToast('エラー: ' + e.message);
  }
};

window.appDownloadCSV = () => {
  downloadCSV();
  showToast('CSVをダウンロードしました');
};

window.switchExpTab    = switchExpTab;
window.appAddExpedition = async () => {
  await addExpedition();
  showToast('遠征を追加しました ✓');
};
window.deleteExpedition = deleteExpedition;
window.updateTheory     = updateTheory;
</script>

</body>
</html>
